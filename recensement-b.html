  .warning{background:#fff6e0;border-left:3px solid var(--orange);padding:.5rem .7rem;font-size:.8rem;margin-bottom:.4rem;border-radius:0 3px 3px 0}

 de la Légion étrangère le 13/05/1935 à Paris. Rengagé jusqu'au 31/12/1947. Etait placé en instance de réforme depuis le 03/11/1944 jusqu'à la fin de la guerre, pour séquelle de blessure de guerre"}, {"label": "Identité déclarée", "value": "se disant de nationalité belge"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "sergent"}, {"label": "Affectation", "value": "CA2"}, {"label": "Section / Spécialité", "value": "mortier, section des engins"}, {"label": "Pendant la campagne", "value": "il est nommé au grade de sergent le 26/11/1939"}, {"label": "Pendant la campagne", "value": "Il est blessé par balle à la tête le 17/06/940 par un \"lâche\" (lors de la retraite des hommes d'autres régiments qui incitent les légionnaires à jeter les armes et cherchent à les décourager sont abattus à bout portant. Le sergent Barbier est blessé par l'un d'eux). Evacué sur l'hôpital de Nancy"}], "warnings": []}, "captivite": {"label": "Captivité", "items": [{"label": "Capture", "value": "Fait prisonnier le 18/06/1940 à l'hôpital de Nancy"}, {"label": "Rapatriement", "value": "Réformé par les autorités allemandes le 25/10/1940"}], "warnings": []}, "citations": {"label": "Citations et décorations", "items": [{"label": null, "value": "JO 05/12/1941 cité à l'ordre de l'armée ordre n°606/D, médaille militaire \"sergent au 11e rég. Étranger d'infanterie: excellent sous-officier. S'étant avancé pour soutenir une fraction d'un régiment voisin vivement pressé par l'ennemi, a été grièvement blessé par balle à la tête au moment où il s'exposait héroïquement pour protéger son officier.\""}, {"label": null, "value": "cité à l'ordre de la brigade ordre n°14 le 01/02/1943 \"Le sergent Barbier Emile, sous officier chef de pièce d’un mortier de 60 a fait preuve le 18 janvier 1943 de belles qualités de sang froid, d’initiative, constamment debout sous les balles pour régler le tir de sa pièce et a contribué à repousser de violentes attaques au bord de la cote 467\""}, {"label": null, "value": "cité à l'ordre de la division n°94 bis du 25/05/1943 \"chef de pièce du mortier 81, détaché auprès de la compagnie du 1er échelon à l’attaque du 6.1.43 dans la région de Loukanda a fait preuve des qualités de sang-froid, d’initiative et de savoir faire nécessaires à l’accomplissement de sa mission d’accompagnement contre battu par un violent bombardement et mortiers ennemis alors que le commandant de Cie auprès de laquelle il était détaché avait été blessé a pris d’autorité l’initiative des tir permettant aux sections de F. du 1er et 2e échelons de prendre pied sur les positions ennemies de la cote 328 avec le minimum de pertes, toujours volontaire par les missions périlleuses\""}, {"label": "Légion d'honneur", "value": "JO 16/12/1955 chevalier de la Légion d'honneur: Barbier (Emile-Jean), sergent-chef, classe 1928, recrutement de Versailles mle 158, 25 ans de services, 9 campagnes, a été blessé et cité"}], "warnings": []}, "justice": {"label": "Justice", "items": [{"label": null, "value": "\"Le petit mantais\" du 24/08/1929, il mutile des animaux et vol d'argent, il est condamné par défaut par le tribunal de la Seine le 31/01/1931 à 3 mois de prison et 50 francs d'amende pour abus de confiance."}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Archives départementales des Yvelines 1R/RM 755"}, {"label": null, "value": "Archives du 11è REI (CDRH-LE, Aubagne)"}], "warnings": []}}}, {"id": "barbiere-alexandre-joseph", "nom": "BARBIÈRE", "prenom": "Alexandre Joseph", "surnom": null, "variantes": null, "date_naissance": "(27/08/1905 - Manage - Belgique)", "ville_naissance": "Manage", "pays_naissance": "Belgique", "intro": "Lors de sa démobilisation il réside à l'école militaire à Paris 7", "blog_url": null, "photo_link": null, "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"etat_civil": {"label": "État civil", "items vasion", "value": "Le soldat BERENBAUM Emile- Nº Mle 75.836 demeurant 11, Rue Buzelin à Paris (18) a obtenu la médaille instituée par la loi du 20 août 1926 complétée par l'ordonnance du 7 Janvier 1944 pour le motif suivant : \"Prisonnier de guerre en Allemagne, depuis juin 1940, s’est le 19 Septembre 1943, après deux tentatives avortées évadé du kommando de Goettingen (Wesphalie). Est parvenu ensuite au prix de maintes difficultés à regagner la France, caché dans un wagon de marchandises. Dés son retour s'est mis au service de la résistance\" (Décret du 25 octobre 1946 - J.O. N ° 278 du 28 Novembre 1946) la présente citation entraîne le droit au port de la croix de Guerre avec étoile de Bronze"}], "warnings": []}, "apres_1940": {"label": "Après juin 1940 : déporté, résistant...", "items": [{"label": "Famille", "value": "Son oncle Abraham est déporté par le convoi n°41 et sa tante Rachel Laufman par le convoi n°77"}, {"label": "Résistant", "value": "alias Dubois et Béranger pour le MNPG (non homologué FFI)"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Fond de Moscou"}, {"label": "Résistant", "value": "SHD Vincennes GR 16 P 49210 (consulté)"}, {"label": null, "value": "AN Pierrefitte sur Seine, 19780005/2 (consulté)"}, {"label": null, "value": "Collection Arolsen - 12063491 - Berembaum Emile"}, {"label": null, "value": "Fonds de Moscou 19940434/252 dossier 20871 - consulté"}, {"label": null, "value": "https://maitron.fr/spip.php?article16313, notice BÉREMBAUM Émile, André, Victor par Jean-Michel Brabant, version mise en ligne le 20 octobre 2008, dernière modification le 20 octobre 2008"}, {"label": null, "value": "Mémorial de la Shoah MDLX/4/2"}], "warnings": []}}}, {"id": "berendy-ladislas", "nom": "BERENDY", "prenom": "Ladislas", "surnom": null, "variantes": null, "date_naissance": null, "ville_naissance": null, "pays_naissance": null, "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "un ent ordre n°1207 C"}, {"label": null, "value": "JO 20/05/1945 page 418 G médaille militaire BERGER (Francis), adjudant, mle 10442, du 1er régiment de marche de la légion étrangère : Sous-officier de légion d’un sang-froid et d’une bravoure remarquables, toujours en avant. S’est révélé un entraîneur d’hommes exceptionnel. Le 16 novembre 1944, à l’attaque de Tonnelot (Haute-Saône), a participé au combat de rues, faisant plus de 30 prisonniers. Le 17 novembre 1944, à Trémoins, a atteint le premier les lisières extérieures du village, nettoyant les maisons tenues par les Allemands et faisant de nombreux prisonniers. À Verlins, a réussi avec sa section à neutraliser les servants d’une pièce antichars. Le 18 novembre 1944, à l’attaque du village de Vauconcourt, a enlevé cette localité, neutralisant toutes les organisations ennemies situées sur les pentes du mont Vaudoux, capturant de nombreux prisonniers. A livré à Échevanne de durs combats de rues dans l’obscurité et sous des feux nourris de mitrailleuses. Le 21 novembre 1944, à Courmont, sous un violent tir d’artillerie et d’armes automatiques ennemies, a contribué à dégager une situation critique. Blessé au cours de l’action, a continué le combat et capturé un commandant SS."}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Rouge vert écho des bouteillons du 11e Régt de Légion étrangère, numéro 10 et 11"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}, {"label": null, "value": "Citation Journal Officiel"}, {"label": null, "value": "PLE REI 11/A/2 carnet de mutation 7è Cie"}], "warnings": []}}}, {"id": "berho", "nom": "BERHO", "prenom": "", "surnom": null, "variantes": null, "date_naissance": null, "ville_naissance": null, "pays_naissance": null, "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"campagne": {"label": "Campagne avec le 11e REI 1 el": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}, {"label": "Affectation", "value": "6è compagnie"}], "warnings": []}, "captivite": {"label": "Captivité", "items": [{"label": "Capture", "value": "Liste des prisonniers n°41 du 20/11/1940"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}], "warnings": []}}}, {"id": "bonnavent-andre", "nom": "BONNAVENT", "prenom": "André", "surnom": null, "variantes": null, "date_naissance": "(12/05/1901 - Louhans - France)", "ville_naissance": "Louhans", "pays_naissance": "France", "intro": "En 1906, il est recensé chez ses parents 3 rue du Change à Chalon-sur-Saône. En 1921 la famille est recensée sans André 10 bis rue de l'Industrie à Chalon. En 1926, il donne comme adresse 40 rue saint Georges à Chalon le domicile de Georgette Beaudon veuve Lacour. En 1931, il habite chez Georgette Lacour 7 cité de Gênes à Paris 20. En 1957 il habite 16 impasse des Couronnes à Paris 20", "blog_url": null, "photo_link": null, "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Léon et Marie Louise Deschamps"}, {"label": "Mariage", "value": "célibataire"}, {"label": "Décès", "value": "le 23/02/1957 à Labruyère"}, {"label": null, "value": "Fratrie: Emile (1899), Georgette (1903), Maurice (1904), Léon (1909), Marcel (1911, multi-récidiviste envoyé en colonie pénitentiaire)"}, {"label": "Profession", "value": "charretier"}, {"label": "Description physique", "value": "1,72m, cheveux blonds, yeux marron"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Active - 4 ans de service à la mobilisation, matricule au corps 6999"}, {"label": "Registre matricule du recrutement", "value": "classe 1921, bureau de Chalon-sur-Saône, mle 760"}, {"label": "Liste matricule", "value": "LM 1935, intendance militaire de Paris"}, {"label": "Service militaire", "value": "appelé à l'activité le 18/04/1921, il manque à l'appel car détenu libérable le 26/09/1921. Le 27/09/1921, il est dirigé sur le fort Saint Jean à Marseille pour être affecté au 4è bataillon d'infanterie légère d'Afrique (BILA), passé dans la disponibilité le 27/09/1923, CBC accordé"}, {"label": "Info Légion", "value": "engagé volontaire pour 5 ans au titre de la Légion étrangère le 10/04/1935 à Paris, démobilisé le 23/06/1945"}, {"label": "Identité déclarée", "value": "se disant de nationalité belge"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}], "warnings": []}, "captivite": {"label": "Captivité", "items": [{"label": "Capture", "value": "Liste des prisonniers n°47 du 02/12/1940"}, {"label": "Lieu de captivité", "value": "Fait prisonnier le 17/06/1940 à Commercy. Il est interné au frontstalag 240 (Verdun) puis interné au stalag II B n°16497"}, {"label": "Rapatriement 1945", "value": "Libéré le 07/06/1945 par les alliés, puis démobilisé le 23/06/1945 à Paris Dupleix"}], "warnings": []}, "justice": {"label": "Justice", "items": [{"label": null, "value": "Le 16/11/1912 il est renversé par une voiture. Le 19/07/1913 il est emmené au commissariat pour avoir fracturé le cadenas d'un bateau pour aller faire du canotage et avoir volé du poisson. En octobre 1914, il est arrêté pour vol de chaussures, il a 14 ans. Le 01/08/1916 il est appréhendé en gare de Chagny pour être monté avec les poilus dans un train dans l'intention d'aller au front. Le 26/06/1918, procès verbal pour avoir dormi en étant débraillé dans le square du palais de justice. Il demeure rue de l'Industrie. Le 20/07/1918 il est arrêté pour vol. Le 02/08/1918 il a une contravention pour être couché dans le square. Il déclare habiter 12 rue de l'industrie et être verrier. Le 23/08/1918, il est condamné par le tribunal de Chalon sur Saône à 4 mois de prison pour vol. Le 07/03/1919, il est condamné par le même tribunal à 2 mois de prison pour vol de bois. Le 04/10/1919, il est condamné pour le vol de fruits à Saint Cosme à 1 mois de prison. Le 30/10/1919, il est condamné à 1 mois de prison pour vol de récolte non détachée du sol. Le 11/02/1921, il a une contravention de 50 francs d'amende pour infraction à la police des chemins de fer. Le 21/02/1921, il est condamné à 8 mois de prison et 5 ans d'interdiction de séjour pour vol, vagabondage, coups et bris de clôture. Il est déclaré sans domicile fixe alors qu'il indique habiter 12 rue de l'industrie chez ses parents. Il a été confié à une société de sauvetage de l'enfance à Grenoble d'où il s'évade. Il est placé dans la colonie pénitentiaire de Metray avant que l'administration le fasse engager pour 3 ans dans l'armée d'où il est réformé. Le 06/05/1926, il est poursuivi pour bagarre, il déclare demeurer 2 rue Saint Georges. Le 14/08/1926, il est arrêté à Chalon pour violation a un interdit de séjour dans la ville (1 mois de prison). Le 23/03/1935, il est condamné par le tribunal de la Seine à 6 jours d'emprisonnement et 300 francs d'amende pour détention de briquets non estampillés"}], "warnings": []}, "presse": {"label": "Presse", "items": [{"label": null, "value": "Journal \"Marianne\" du 12/04/1939 légionnaires cherchent gentilles marraines \"Bonnavent André du 1/2 REI7è Cie Algérie\""}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Archives départementales de Saône et Loire 1 R RM Chalon 1921/2"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}, {"label": null, "value": "Fonds de Moscou 19940434/462 dossier 38355 (1921-1925)"}], "warnings": []}}}, {"id": "borne-roger-charles", "nom": "BORNE", "prenom": "Roger Charles", "surnom": null, "variantes": null, "date_naissance": "(18/04/1900 - Dijon - France)", "ville_naissance" uch, le 16 à Egenhausen et le 21 à Mohringen (faubourg de Stuttgart), faisait de nombreux prisonniers et s’emparait d’un important butin. Enfin, le 30 avril, à Lochau, il détachait un mixte client pris sous feu ennemi d’armes automatiques et antichars ennemis, a réussi par son énergie à rétablir la situation et à se maintenir jusqu’à l’arrivée des renforts. A été blessé deux fois de l’action. Ne s’est fait évacuer que sur l’ordre formel de son chef de situation son remplaçant."}, {"label": "Légion d'honneur", "value": "Légion d'honneur"}], "warnings": []}, "presse": {"label": "Presse", "items": [{"label": null, "value": "JO 10/04/1938 promu lieutenant"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "SHD Vincennes GR 2000 Z 1618/11434"}], "warnings": []}}}, {"id": "boukel", "nom": "BOUKEL", "prenom": "", "surnom": null, "variantes": "BARKEL", "date_naissance": null, "ville_naissance": null, "pays_naissance": null, "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}, {"label": "Affectation", "value": "10è compagnie"}, {"label": "Pendant la campagne", "value": "Il est porté disparu vers le 16/06/1940"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Archives du 11è REI (SHD Vincennes, 34 N 316)"}], "warnings": []}}}, {"id": "boulanger-maurice-jean-fernand", "nom": "BOULANGER", "prenom": "Maurice Jean Fernand", "surnom": null, "variantes": null, "date_naissance": "(25/07/1906 - Châlons sur Marne - France)", "ville_naissance": "Châlons sur Marne", "pays_naissance": "France", "intro": "En 1915, la famille est domiciliée 47 rue Saint Fargeau à Paris 20. En 1926, sa mère et ses frères habitent 28 rue du télégraphe à Paris 20. En 1939, il est inscrit sur les listes électorales de Paris, il est domicilié const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  return `
  <div class="card" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${p.photo_link ? ' <a class="photo-link" href="' + esc(p.photo_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Portrait disponible">📷</a>' : ''}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        ${introHtml}
        ${sectionsHtml}
        <a class="anchor-link" href="#${p.id}">#${p.id}</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
