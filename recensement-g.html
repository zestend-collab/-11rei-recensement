. A toujours fait preuve de la plus haute intelligence et du courage le plus lucide. En fin d’après-midi, le 19 juin 1940, a arrêté la progression ennemie, empêchant par son action rapide et judicieuse l'encerclement du bataillon"}, {"label": null, "value": "JO 16/12/1945 page 1037 G. GRANGE (Humbert-Marie-Louis-Lucien), capitaine, régiment de marche de la Légion étrangère : brillant officier de légion, au jugement sûr, aux décisions rapides, prenant dans les situations difficiles les initiatives les plus heureuses ; a imprégné son unité d’un magnifique allant. Le 6 avril, s’est emparé, à la pointe de Durrenshütten, grâce à une manœuvre habile et rapide, capturant intacts 4 canons avec leurs servants et faisant 90 prisonniers. Le 8 avril, son unité d’élite arrêtée sur les lisières nord-ouest de Pforzheim par des tirs d’armes automatiques et de mortiers, a été gravement blessé à la jambe au moment où il donnait des ordres à son observateur d’artillerie pour prendre à partie les résistances."}, {"label": "Légion d'honneur", "value": "décret du 07/11/1945 Légion d'honneur"}], "warnings": []}, "presse": {"label": "Presse", "items": [{"label": null, "value": "JO 06/09/1936 promu lieutenant"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Archives du 11è REI (CDRH-LE, Aubagne)"}, {"label": null, "value": "SHD Vincennes GR 8YE 63146 (consulté)"}], "warnings": []}}}, {"id": "grasset", "nom": "GRASSET", "prenom": "", "surnom": null, "variantes": null, "date_naissance": null, "ville_naissance": null, "pays_naissance": null, "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"etat_civil": {"label": "État civil", "items": [], "warnings": [{"label": "Possible doublon", "value": "Peut être en doublon avec le suivant"}]}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Active"}], "warnings": []}, "campagne": { riantes": null, "date_naissance": "(07/01/1902 - Budapest - Hongrie)", "ville_naissance": "Budapest", "pays_naissance": "Hongrie", "intro": "Il arrive en France en 1926 et s'installe jusqu'en 1932 à Merlebach en Moselle où il est mineur. En 1936 il est recensé 24 rue de l'équitation à Nancy. Le 23/05/1945, il adhère à l'Union des Engagés Volontaires Anciens Combattants Juifs (UEVACJ)", "blog_url": "https://www.11regimentetranger.com/blog/grossaug-jacob", "photo_link": "https://www.11regimentetranger.com/portraits#h.teu0v5oougaj", "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Eizigler et Sarolta Aloisia Metz (mariés en 1915)"}, {"label": "Mariage", "value": "le 06/08/1934 à Nancy avec Fradel Anger. Le 24/05/1956 à Metz avec Pessel Loriner"}, {"label": "Enfant(s)", "value": "Léon (1935) et Anna (1938). Tous deux morts en déportation"}, {"label": null, "value": "Fratrie: Jozsa Aranka (1884) Armin (1900 marié en 1920 et 1932 en Hongrie), Aranka (1906), Ilona (1909 mariée en 1943 en Hongrie), Janka (1911), Zita(1914)"}, {"label": "Profession", "value": "mineur à Merlebach de 1926 à 1932, ouvrier tailleur"}, {"label": "Description physique", "value": "1,80 m, cheveux bruns, yeux noirs"}], "warnings": []}, "naturalisation": {"label": "Naturalisé", "items": [{"label": null, "value": "JO 12/01/1946 naturalisé GROSSANG (Jacob), tailleur, né le 7 Janvier 1902, de père polonais, à Budapest (Hongrie), demeurant à Nancy"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "EVDG"}, {"label": "Liste matricule", "value": "LM 1939, intendance militaire de Nancy, n°728. Engagé le 16/09/1939"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}, {"label": "Affectation", "value": "3è bataillon"}], "warnings": []}, "captivite": {"la const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];
const PHOTO_BASE = "https://raw.githubusercontent.com/zestend-collab/11rei-photos/main/";

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  const variantesHtml = p.variantes ? ' <span class="variantes-suffix">(variantes : ' + esc(p.variantes) + ')</span>' : '';
  const photoUrl = PHOTO_BASE + encodeURIComponent(p.id) + '.jpg';
  const onErr = "this.closest('.card').classList.remove('has-photo'); this.closest('.portrait-thumb,.portrait-large').style.display='none';";
  const thumbHtml = '<div class="portrait-thumb"><img src="' + photoUrl + '" alt="" loading="lazy" onerror="' + onErr + '"></div>';
  const largeHtml = '<div class="portrait-large"><img src="' + photoUrl + '" alt="Portrait de ' + esc(fullName) + '" loading="lazy" onerror="' + onErr + '"><div class="cap">Portrait</div></div>';
  return `
  <div class="card has-photo" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      ${thumbHtml}
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${variantesHtml}${p.photo_link ? ' <a class="photo-link" href="' + esc(p.photo_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Voir sur la page Portraits">📷</a>' : ''}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        <div class="body-with-photo">
          ${largeHtml}
          <div class="body-main">
            ${introHtml}
            ${sectionsHtml}
            <a class="anchor-link" href="#${p.id}">#${p.id}</a>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  const qParam = new URLSearchParams(location.search).get('q');
  if(qParam){
    const input = document.getElementById('search');
    input.value = qParam;
    filterList(qParam);
  }

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
