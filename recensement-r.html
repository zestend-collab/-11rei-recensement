<style>

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{

  }
  html{overflow-x:hidden}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;font-weight:300;min-height:100vh;overflow-x:hidden}

  header{background:var(--white);border-bottom:2px solid var(--orange);padding:1.1rem 2rem;z-index:50}
  header .inner{max-width:900px;margin:0 auto;display:flex;align-items:baseline;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  header h1{font-family:'EB Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--ink)}
  header .sub{color:var(--muted);font-size:.78rem}
  header .letter-badge{background:var(--orange);color:var(--ink);font-family:'EB Garamond',serif;font-weight:600;font-size:1.3rem;width:2.2rem;height:2.2rem;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  header .titlewrap{display:flex;align-items:center;gap:.75rem}

  .letter-nav{background:var(--white);border-bottom:1px solid var(--border)}
  .letter-nav-inner{max-width:900px;margin:0 auto;padding:.5rem 2rem;display:flex;gap:.35rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  .letter-nav-inner::-webkit-scrollbar{height:4px}
  .letter-nav a{flex-shrink:0;display:flex;align-items:center;justify-content:center;min-width:1.9rem;height:1.9rem;padding:0 .3rem;border-radius:4px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:500;text-decoration:none;color:var(--muted);border:1px solid transparent;text-transform:uppercase}
  .letter-nav a:hover{border-color:var(--orange);color:var(--ink)}
  .letter-nav a.current{background:var(--orange);color:var(--ink);font-weight:700}

  .search-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:.7rem 2rem;box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .search-bar-inner{max-width:900px;margin:0 auto;display:flex;gap:.5rem;align-items:center}
  .stamp{display:inline-block;font-family:'Inter',sans-serif;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 6px;border-radius:3px;border:1.4px solid;line-height:1.3;white-space:nowrap;background:var(--white)}
  .stamp-mort{color:#c0392b;border-color:#c0392b}
  .stamp-prison{color:#7f8c8d;border-color:#7f8c8d}
  .stamp-evade{color:#27ae60;border-color:#27ae60}
  .stamp-mortcap{color:#8e44ad;border-color:#8e44ad}
  .stamp-deporte{color:#2c3e50;border-color:#2c3e50}
  .stamp-resistant{color:#d35400;border-color:#d35400}
  .stamp-afn{color:#b9791f;border-color:#fab855;background:#fff8ec}
  .stamp-unknown{color:#999;border-color:#ccc}

  main{max-width:900px;margin:1.5rem auto 4rem;padding:0 2rem}
  .count{font-family:'EB Garamond',serif;font-style:italic;color:var(--muted);margin:1rem 0;font-size:.95rem}
  .search-input{flex:1;min-width:0;padding:.7rem 1rem;font-family:'Inter',sans-serif;font-size:.95rem;border:1.5px solid var(--border);border-radius:5px;background:var(--white);color:var(--ink);outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--link)}
  .search-input::placeholder{color:#999}
  .reset-btn{flex-shrink:0;background:var(--white);border:1.5px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:.8rem;padding:.65rem .9rem;border-radius:5px;cursor:pointer;transition:all .15s}
  .reset-btn:hover{border-color:var(--link);color:var(--link)}
  .no-results{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-family:'EB Garamond',serif;font-style:italic;display:none}

  .top-btn{flex-shrink:0;width:2.5rem;background:var(--white);border:1.5px solid var(--border);color:var(--muted);font-size:1rem;padding:.55rem;border-radius:5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .top-btn:hover{border-color:var(--link);color:var(--link)}

  .card{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:.6rem;overflow:hidden;scroll-margin-top:6.5rem;transition:box-shadow .15s}
  .card.open{box-shadow:0 3px 14px rgba(0,0,0,.12)}
  .card-head{display:flex;align-items:center;gap:.9rem;padding:.85rem 1.1rem;cursor:pointer;user-select:none}
  .card-head:hover{background:var(--row)}
  .toggle{width:1.6rem;height:1.6rem;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Inter',sans-serif;font-size:1.1rem;line-height:1;color:var(--muted);transition:all .18s}
  .card.open .toggle{background:var(--link);border-color:var(--link);color:var(--white);transform:rotate(45deg)}
  .card-summary{flex:1;min-width:0}
  .card-name{font-family:'EB Garamond',serif;font-weight:600;font-size:1.05rem;display:inline-flex;align-items:baseline;gap:.6rem;flex-wrap:wrap}
  .surnom-suffix{font-family:'Inter',sans-serif;font-weight:400;font-style:italic;font-size:.78rem;color:var(--muted)}
  .blog-link{font-family:'Inter',sans-serif;font-size:.72rem;font-weight:500;color:var(--link);text-decoration:none;white-space:nowrap}
  .blog-link:hover{text-decoration:underline}
  .photo-link{text-decoration:none;font-size:.85rem;opacity:.8}
  .photo-link:hover{opacity:1}
  .card-meta{color:var(--muted);font-size:.78rem;margin-top:.15rem}
  .card-badges{display:flex;gap:.3rem;flex-shrink:0;flex-wrap:wrap;max-width:9rem;justify-content:flex-end}
  .card-badges .stamp{font-size:.56rem;padding:1px 5px}

  .card-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
  .card.open .card-body{max-height:4000px}
  .card-body-inner{padding:.2rem 1.1rem 1.2rem;border-top:1px solid var(--border)}

  .section{margin-top:1rem}
  .intro{font-family:'EB Garamond',serif;font-style:italic;font-size:.9rem;color:var(--muted);margin-top:.6rem;line-height:1.5}
  .section h3{font-family:'EB Garamond',serif;font-size:.95rem;font-weight:600;color:var(--ink);border-bottom:1px solid var(--orange);padding-bottom:.25rem;margin-bottom:.5rem}
  .field{margin-bottom:.32rem;font-size:.85rem;line-height:1.5}
  .field .flabel{color:var(--muted);font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-right:.35em}
  .field .flabel::after{content:" : "}
  .warning{background:#fff6e0;border-left:3px solid var(--orange);padding:.5rem .7rem;font-size:.8rem;margin-bottom:.4rem;border-radius:0 3px 3px 0}
  .warning .flabel{color:#a06b00;font-weight:600;text-transform:none;letter-spacing:0;font-size:.72rem}
  .warning .flabel::after{content:" : "}

  .anchor-link{font-size:.7rem;color:var(--muted);text-decoration:none;margin-top:.5rem;display:inline-block}
  .anchor-link:hover{color:var(--link)}



  @media (max-width: 480px){
    header{padding-left:1rem;padding-right:1rem}
    .search-bar{padding-left:1rem;padding-right:1rem}
    .letter-nav-inner{padding-left:1rem;padding-right:1rem}
    main{padding-left:1rem;padding-right:1rem}
    .reset-btn .reset-label{display:none}

è liste de citations page CG 980) cité à l’ordre de la Brigade, ordre Général n° 11 du 5 juin 1940 \"Agent de liaison merveilleux de courage et de froide énergie. Toujours volontaire pour assurer les missions les plus périlleuses. Le 27.5.1940, pris personnellement des commandants isolés qui n’avaient pu rejoindre leur unité et a bouché de sa propre initiative un trou qui se produisait vers le régiment voisin.\" JO 31/10/1942 médaille militaire \"sergent chef au 11e rég. étranger d'infanterie: ancien sous-officier de la légion déjà cité à l'ordre de l'armée sur les théâtres d'opérations extérieurs. EVDG volontaire pour la durée de la guerre, a été un magnifique exemple de bravoure, de sang-froid et de mépris du danger. Constamment sur la brèche, a fait l'admiration de tous. Blessé le 18 juin 1940 à Saint Germain sur Meuse en exécutant une difficile mission de liaison avec un bataillon engagé, a refusé de se laisser évacuer et a tenu, malgré ses souffrances, à rester à son poste de combat.\""}, {"label": "Légion d'honneur", "value": "JO 01/04/1948 Chevalier de la Légion d’Honneur – Médaille Militaire (JO 31/10/1942) – Croix de Guerre 1939/1945 avec une palme, 1 étoile d’argent, 1 étoile de bronze, – Croix de Guerre des TOE avec deux palmes, – Médaille Commémorative de 1939/1945 avec agraffe \"France-Libération\" – Médaille Coloniale avec agraffe \"Extrême-Orient\""}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Archives du 11è REI (CDRH-LE, Aubagne)"}, {"label": null, "value": "https://docplayer.fr/45522153-Episodes-de-la-vie-fribourgeoise-iv.html"}], "warnings": []}}}, {"id": "roullier-marcel", "nom": "ROULLIER", "prenom": "Marcel", "surnom": null, "variantes": null, "date_naissance": "(04/09/1914 - Graide - Belgique)", "ville_naissance": "Graide", "pays_naissance": "Belgique", "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"camp s avec Marcelle Marie Kauffoltz"}, {"label": "Décès", "value": "le 22/04/1979 à Clichy la Garenne"}, {"label": "Profession", "value": "mécanicien"}, {"label": "Description physique", "value": "1,63 m, cheveux châtains, yeux marrons. Cicatrice de coupure à la main gauche"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Active - 4 ans de service à la mobilisation"}, {"label": "Registre matricule du recrutement", "value": "classe 1928, bureau de Belfort, mle 661"}, {"label": "Carrière militaire", "value": "engagé volontaire pour 3 ans au titre du 5è équipage de la flotte (Toulon) le 22/03/1926 à Versailles. Déclaré déserteur le 13/08/1926, arrêté par les gendarmes de Strasbourg le 27/09/1926. Condamné par le Conseil de guerre de la Bretagne dans sa séance du 18/01/1927 à un an de prison et aux frais envers l'état pour désertion à l'intérieur en temps de paix. Venant de la maison d'arrêt de Toulon, il est affecté au 3è BILA le 27/10/1927. Passé dans la disponibilité le 06/11/1928, CBC refusé."}, {"label": "Info Légion", "value": "engagé volontaire pour 5 ans au titre de la Légion étrangère le 19/03/1930 à Paris. Nommé caporal le 01/01/1931 et cassé de son grade le 23/11/1931 pour indignité. Ecroué à la prison militaire de Meknès. Son contrat est résilié par mesure disciplinaire, il est rayé des contrôles le 13/11/1933. Engagé volontaire pour 5 ans au titre de la Légion étrangère le 23/02/1938 à Paris, démobilisé le 20/11/1943. Engagé volontaire pour 5 ans au titre de la Légion étrangère le 19/12/1944 à Marseille, réformé définitif n°1 le 12/04/1946 (15%)"}, {"label": "Identité déclarée", "value": "se disant de nationalité belge"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}], "warnings": []}, "captivite": {"label": "Captivité", "items": [{"label": "Capture", "value": "Liste des prisonniers n°13 du 10/09/1940"}, {"label": "Lieu de captivité", "value": "Il est interné au stalag XII B"}, {"label": "Rapatriement", "value": "Rapatrié le 27/08/1943 et démobilisé le 20/11/1943 à Paris"}], "warnings": []}, "citations": {"label": "Citations et décorations", "items": [{"label": null, "value": "Cité à l’ordre du régiment n° 2012/C en date du 05/07/1947 du Ministre de la Guerre. \"Excellent légionnaire. Les 18 et 19.6.1940 après d’écrasantes fatigues s’est magnifiquement comporté au cours d’attaques répétées. Demeurant inébranlable sur des positions très exposées malgré un violent tir d’artillerie et le décrochage d’unités voisines\". Croix de guerre – Étoile de Bronze"}, {"label": null, "value": "Cité à l’ordre de la division n°78 du 06/06/1945 \"Jeune caporal animé des plus belles qualités militaires. Le 5 avril 1945 à Klingenberg (Allemagne) a pris le commandement de son groupe après la mise hors de combat de son chef et a su communiquer à ses hommes un allant irrésistible qui les a fait réduire une forte résistance ennemie\". Blessé au cours de l’action."}, {"label": null, "value": "JO 30/12/1953 médaille militaire réformés pour blessures de guerre avec une invalidité inférieure à 65 p. 100 Rudloff (Paul - Ernest), caporal-chef, classe 1928, recrutement de Belfort, mle 661; 20 ans de services, 11 campagnes, a été blessé et cité"}], "warnings": []}, "justice": {"label": "Justice", "items": [{"label": null, "value": "Le 27/10/1926, il est condamné par le tribunal correctionnel de Strasbourg à 3 mois de prison pour vol, escroquerie et abus de confiance"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Archives départementales du Territoire de Belfort 1R350"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}], "warnings": []}}}, {"id": "rudnicki-wasyl", "nom": "RUDNICKI", "prenom": "Wasyl", "surnom": null, "variantes": null, "date_naissance": "(13/01/1904 - Skargawa - Pologne)", "ville_naissance": "Ska const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  return `
  <div class="card" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${p.photo_link ? ' <a class="photo-link" href="' + esc(p.photo_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Portrait disponible">📷</a>' : ''}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        ${introHtml}
        ${sectionsHtml}
        <a class="anchor-link" href="#${p.id}">#${p.id}</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
