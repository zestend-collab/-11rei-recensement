ut de Juif étranger. Il est arrêté à Lyon le 18/01/1944 et interné à la prison de Montluc avant son transfert vers Drancy le 21/03/1944. 4 jours plus tard, il est déporté à Auschwitz par le convoi n°70 (matricule 17332) où il est affecté au kommando de Laurahütte (Siemianowice), un camp annexe d'Auschwitz III-Monowitz où les détenus travaillaient pour l'entreprise Oberschlesische Geräteban GmbH. Il est transféré à Mauthausen puis au kdo de Grolitz le 03/03/1945 et au camp de Flossenbourg (mle 83887)."}, {"label": "Mort en déportation", "value": "Il est rapatrié le 24/05/1945"}, {"label": "Famille", "value": "Sa femme Cypa a un dossier d'interné déporté \"inadmis\" (SHD de Caen AC 21 P 259768 + AC 21 P 578743). Elle décède à Clichy en 1952, son acte de décès a en mention marginale \"mort pour la France\". Sa sœur Brucha est décédée dans le ghetto de Varsovie"}, {"label": "Résistant", "value": "résistant FFI de 1943 au 27/03/1944. Interné au fort de Montluc puis déporté à Auschwitz"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Déporté survivant", "value": "SHD Caen, AC 21 P 578744 (Josek) + SHD Caen AC 21 P 259768 (sa femme Cypa)"}, {"label": null, "value": "Collection Arolsen 4992614 - 78301066 - 10900708 - JOSEF KANAR + 06030302.0.665.204 (1957 - 1972)"}, {"label": null, "value": "Archives départementales du Rhône et de la métropole de Lyon, 3335W - Personnes internées dans la prison Montluc de Lyon (1939-1945)"}, {"label": null, "value": "Landesarchiv Berlin, B Rep. 025-05 : 10407/59 Verfahren Joseph Kanar (*12.09.1903), 397 Rue des Pyrénées, Paris 20, France, contre le Reich allemand (1959)"}, {"label": null, "value": "Mémorial de la Shoah MDLX/4/2"}], "warnings": []}}}, {"id": "kanzian-michel", "nom": "KANZIAN", "prenom": "Michel", "surnom": null, "variantes": null, "date_naissance": "(05/01/1904 - Dravograd - Yougoslavie)", "ville_naissance": "Dravograd", "pays_naissance": "Yougoslavie", "intro": null, "blog_url": null, "photo_link": t avec le 11e REI", "items": [{"label": "Mort", "value": "Mort le 16/01/1940"}, {"label": "Lieu du décès", "value": "Metzervisse au GSD 80"}, {"label": "Cause", "value": "accident ou suicide, tué par balle à son poste de garde au PA3. Capitaine PERROSSIER Cdt la 7ème Cie au sujet de la mort du Légionnaire de 2ème classe KOECHER François, numéro Matricule 70330 de son unité. \nAyant appris, par téléphone, dans la soirée du 16 Janvier 1940 la mort du légionnaire KOECHER François au P.A.5, je m'y rendis dès le lendemain matin pour déterminer les circonstances de cette mort. J'y recueillis les déclarations que voici: \nDéclaration du Lieutenant FORGET Cdt le P.A.3. J'étais réveillé dans mon gourbi lorsque, vers 23h50 cette nuit, j'entendis une détonation semblant provenir d'assez loin. Quelques minutes plus tard, le Caporal de quart vint me prévenir que le légionnaire KOECHER était mort à son poste de garde. Je me rendis immédiatement sur les lieux et trouvais KOECHER couché dans le fond de la tranchée le crâne littéralement éclaté. Le revolver qu'il portait (étant chargeur de son groupe) était dans son étui au ceinturon; le mousqueton qui servait successivement a toutes les sentinelles était appuyé sur le bord de la tranchée et contenait un étui vide dans la chambre. Comme il n'y avait eu qu'une détonation, j'en déduisais qu'il n'avait pas été tué par un projectile venu de l'extérieur, mais que le coup était parti de son propre mousqueton. Je fis immédiatement renforcer la garde à cet emplacement et rendis compte téléphoniquement à mon Capitaine en lui demandant les brancardiers dès la levée du jour. Étant donné le lieu et l'heure qui m'interdirent toute lumière et tout bruit, je laissais le légionnaire KOECHER sur place et emportais dans mon gourbi le mousqueton comme pièce à conviction. Dès la levée du jour, je fis arranger le corps sur des couvertures et rassembler les affaires d'équipement de KOECHER. La presque totalité du cerveau ayant giclé un peu partout, je fis rassembler les morceaux et ensevelir a proximité. Lorsque les brancardiers arrivèrent, je fis rendre les honneurs par le groupe auquel appartenait le légionnaire KOECHER. \nDéclaration du Caporal HERMANN gradé de quart. J'ai pris mon service à 22 heures 45 le 15 Janvier, KOECHER fut la première sentinelle auprès de laquelle je me rendis pour m'assurer qu'il n'y avait rien à signaler. Je me rendis successivement a deux autres postes de guet, lorsque j'entendis une détonation assez sourde semblant être celle produite par un revolver et venant de la direction du 1er poste de guet que j'avais visité. Je revenais sur mes pas en passant cette fois par le 1er poste de guet et y interrogeais la sentinelle qui me dit avoir entendu effectivement la détonation et ne pas croire qu'elle fut produite par un fusil parce que très sourde. Je me dirigeais vers le 1er poste d'où provenait la détonation et trouvais le légionnaire KOECHER par terre, mort à son poste. Je revins alors prévenir le Chef de Section et pris mes dispositions pour faire assurer le guet par un autre légionnaire. \nDéclaration du Légionnaire de 2ème Classe WINCK. N'ayant pas dormi à cause du froid, je me chauffais les pieds dans le gourbi situé à 5 mètres du poste de guet. J'ai entendu un coup de feu semblant venir de très loin. Je ne suis pas sortit tout de suite mais seulement quelques minutes après lorsque le Caporal HERMANN venu sur les lieux, appela mon nom à la porte. Je suis sorti une première fois, je n'ai rien vu. Je suis rentré dans mon gourbi pour chercher mon arme et ce n'est qu'après, en regardant que j'aperçus KOECHER courbé au fond de la tranchée, son mousqueton appuyé sur le bord. A ce moment, le lieutenant commandant la section est arrivé"}, {"label": "Sépulture définitive", "value": "cimetière de Basse Yutz tombe A 159 plaque 313"}, {"label": "Transcription", "value": "acte de décès transcrit à Paris 1er le 18/04/1940"}], "warnings": []}, "presse": {"label": "Presse", "items": [{"label": null, const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  return `
  <div class="card" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${p.photo_link ? ' <a class="photo-link" href="' + esc(p.photo_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Portrait disponible">📷</a>' : ''}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        ${introHtml}
        ${sectionsHtml}
        <a class="anchor-link" href="#${p.id}">#${p.id}</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  const qParam = new URLSearchParams(location.search).get('q');
  if(qParam){
    const input = document.getElementById('search');
    input.value = qParam;
    filterList(qParam);
  }

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
</body>
</html>
