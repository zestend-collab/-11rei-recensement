s": [{"label": null, "value": "JO 12/12/1942 (4è liste de citations page CGM 222) cité à l’ordre de la brigade ordre n°1207 C. \"Légionnaire brave et dévoué. Servant de canon de 25, s’est particulièrement distingué par son sang-froid et la précision de ses tirs le 17 juin 1940 à Void en arrêtant une petite colonne motorisée ennemie, mettant plusieurs engins dont un char hors de combat\""}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "ESS BALE"}, {"label": "Résistant", "value": "SHD Vincennes GR 16 P 130865 (consulté)"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}, {"label": null, "value": "http://foreignlegion.info/legionnaires-parachutistes-pendant-la-seconde-guerre-mondiale/"}, {"label": null, "value": "Fonds de Moscou 19940437/264 dossier 24492 (1938-1939)"}], "warnings": []}}}, {"id": "clairet-claude-andre", "nom": "CLAIRET", "prenom": "Claude André", "surnom": null, "variantes": null, "date_naissance": "(21/08/1898 - Thizy - France)", "ville_naissance": "Thizy", "pays_naissance": "France", "intro": "En 1921, il réside au 14 rue Pelletier à Villeurbanne. En 1925, il vit à Nancy, rue de la Hache.", "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Jean Jules Alphonse (décès en 1912) et Marie Agarithe Feliza. Ses parents divorcent en 1903, et la garde des enfants est d’abord confiée au père jusqu'à ce qu'il soit déchu de ses droits au profit de l'assistance publique. Le 29 juin 1904, il est admis à l’assistance publique de Lyon comme enfant moralement abandonné ( enfant assisté 3X292/105 n° de matricule 54121). Cette décision fait suite aux signalements de l’opinion publique de Thizy auprès des autorités locales : les parents ne s’occupent en aucune manière de leurs enfants, lesquels sont régulièrement maltraités par leur père. Claude André Clairet est alors placé à Innimond, dans l’Ain, d’abord dans la famille Clapot puis dans la famille Guiffray (recensements de 1906 et 1911). Pendant ce temps, sa mère, remariée, vit en 1906 au 42 rue Dedieu à Villeurbanne avec tous ses enfants, sauf Claude André et son frère Philibert. Entre 1912 et 1913, André s’enfuit à plusieurs reprises des différents lieux de placement. L’administration le décrit comme de mauvais caractère, brutal avec les animaux, fainéant, et porteur d’un couteau à cran d’arrêt ainsi que d’un pistolet. En novembre 1912, sa mère, devenue Mme Dumas, sollicite la restitution de ses enfants. Sa demande est rejetée : les autorités estiment qu’elle n’agit que dans le but de percevoir la rente versée à André après le décès de son père la même année. L’administration souligne par ailleurs son alcoolisme et ses mœurs jugées déplorables. En 1915, âgé de 17 ans et demi, Claude André s’engage volontairement pour la durée de la guerre."}, {"label": "Mariage", "value": "en concubinage avec Marie Joséphine Bogé. Les bans de mariage sont publiés le 14/02/1925. Mais la fiancée meurt en 1926"}, {"label": "Décès", "value": "le 01/04/1963 à Pierre Bénite"}, {"label": "Enfant(s)", "value": "Roger Clairet enfant naturel reconnu né en 1924 à Nancy. Il est confié à l'assistance publique de Lyon (dossier 3X343/42)"}, {"label": null, "value": "Fratrie: Jeanne Marguerite (1886), Raymond Aimé (1889-1936), Joanny Eloi (1890), Julien Felix(1894-1894), Philibert Marius (1899 mort pour la France en 1918). Fratrie 2; Jeanne Dumas (1900), Marguerite Dumas (1903), Louise Dumas (1910)"}, {"label": "Profession", "value": "cultivateur"}, {"label": "Description physique", "value": "1,61m, cheveux châtains, yeux bleus"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Active - 12 ans de service à la mobilisation, matricule au corps 65166"}, {"label": "Registre matricule du recrutement", " ue": "JO 25/01/1943 ordre 921/D COSTA (Sauveur), capitaine au 11e rég. étranger d'infanterie: commandant de compagnie aussi remarquable par son splendide moral que par son calme absolu sous le feu. Le 27 mai 1940, au bois d'Inor, restant seul valide du personnel de commandement, a sous un bombardement violent transporté lui-même au poste de secours régimentaire son ordonnance grièvement blessé; donnant ainsi à ses légionnaires la preuve du plus noble courage et du plus pur dévouement. Le 17 juin 1940, aux lisières Nord de la forêt de Saint-Void, a arrêté une attaque de blindés, détruit une voiture et fait des prisonniers. Le 18 juin, à Saint Germain sur Meuse, a, sous le bombardement et la mitraille, maintenu sa position pendant vingt-quatre heures, assurant lui-même, au plus fort de la bataille livrée par un ennemi nombreux et agressif le ravitaillement par chenillette de sa ligne de feu, assurant la liaison avec les unités voisines et renseignant exactement son chef de corps sur les fluctuations du combat"}], "warnings": []}, "presse": {"label": "Presse", "items": [{"label": null, "value": "JO1/07/1931 promu lieutenant JO 07/10/1933 corps des interprètes militaires langue arabe JO 01/04/1939 promu capitaine"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Archives départementales de la Corse 9 NUM 60/331"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}, {"label": null, "value": "SHD Vincennes GR 8YE 125999 (consulté)"}], "warnings": []}}}, {"id": "cote-gabriel-roger-marcel", "nom": "COTE", "prenom": "Gabriel Roger Marcel", "surnom": null, "variantes": null, "date_naissance": "(24/10/1902 - Maussans - France)", "ville_naissance": "Maussans", "pays_naissance": "France", "intro": "En 1926 il est domicilié rue Taillandier à Paris 11, en 1936 à Maussans", "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "s function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));

  return parts.join(' · ');
}

  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  const variantesHtml = p.variantes ? ' <span class="variantes-suffix">(variantes : ' + esc(p.variantes) + ')</span>' : '';
  const photoUrl = PHOTO_BASE + encodeURIComponent(p.id) + '.jpg';
  const onErr = "this.closest('.card').classList.remove('has-photo'); this.closest('.portrait-thumb,.portrait-large').style.display='none';";
  const thumbHtml = '<div class="portrait-thumb"><img src="' + photoUrl + '" alt="" loading="lazy" onerror="' + onErr + '"></div>';
  const largeHtml = '<div class="portrait-large"><img src="' + photoUrl + '" alt="Portrait de ' + esc(fullName) + '" loading="lazy" onerror="' + onErr + '"><div class="cap">Portrait</div></div>';
  return `
  <div class="card has-photo" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      ${thumbHtml}
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${variantesHtml}${p.photo_link ? ' <a class="photo-link" href="' + esc(p.photo_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Voir sur la page Portraits">📷</a>' : ''}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        <div class="body-with-photo">
          ${largeHtml}
          <div class="body-main">
            ${introHtml}
            ${sectionsHtml}
            <a class="anchor-link" href="#${p.id}">#${p.id}</a>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  const qParam = new URLSearchParams(location.search).get('q');
  if(qParam){
    const input = document.getElementById('search');
    input.value = qParam;
    filterList(qParam);
  }

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
</body>
</html>
