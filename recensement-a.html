": "Après juin 1940 : déporté, résistant...", "items": [{"label": "Déportation", "value": "Il est déporté à Mauthausen le 19/12/1941 (mle 4687)"}, {"label": "Mort en déportation", "value": "Mort le 02/03/1943 à Mauthausen, à 6h40 au block 19 (cause du décès faiblesse circulatoire). Son acte de décès est dressé en 1952, arrêté du 20 février 1992 portant apposition de la mention \"Mort en déportation\" sur son acte de décès"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "ACICR C G2 IB"}, {"label": null, "value": "SHD Caen, AC 21 P 417321 - déportation"}, {"label": null, "value": "Collection Arolsen 1328366 - BERNABE ALCAZAR SANCHEZ"}, {"label": null, "value": "OFPRA fichier espagnol"}], "warnings": []}}}, {"id": "alexandroff-demetre", "nom": "ALEXANDROFF", "prenom": "Demètre", "surnom": null, "variantes": null, "date_naissance": "(01/01/1900 - Odessa - Russie)", "ville_naissance": "Odessa", "pays_naissance": "Russie", "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Alexandre et Espérance Constantine Nicolacopoulos, domiciliés en Grèce"}, {"label": "Mariage", "value": "célibataire"}, {"label": null, "value": "Fratrie: mariée à Georges Nicolacopoulos. Costantin Nicolacopoulos est son beau frère"}, {"label": "Personne à prévenir", "value": "Personne à prévenir: sa mère ou Dallegio Zoto (indiqué être son père!). Il envoie sa dernière lettre à sa famille en Grèce le 20/01/1940"}], "warnings": [{"label": "Précision d'identité", "value": "indique aussi être né le 20/08/1898 au Pirée en Grèce"}]}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Active - 10 ans de service à la mobilisation, matricule au corps 87155"}, {"label": "Liste matricule", "value": "LM 1929, intendance militaire de Paris, n°5"}, {"label": "Info Légion", "value": "engagé volontaire pour 5 ans au titre de la Légion étrangère en 1929"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": null, "value": "Il vient du 3è REI. A fait une formation de topographe"}, {"label": "Grade", "value": "adjudant"}, {"label": "Affectation", "value": "11è compagnie"}, {"label": "Section / Spécialité", "value": "3è section"}], "warnings": []}, "mort_au_combat": {"label": "Mort avec le 11e REI", "items": [{"label": "Mort", "value": "Mort le 24/01/1940"}, {"label": "Précision décès", "value": "non mort pour la France, tué accidentellement. Rapport du chef de bataillon ROBITAILLE, Commandant provisoirement le XI e régiment Étranger d'infanterie sur les circonstances du décès de l'adjudant ALEXANDROFF Demet de la 11è Compagnie du XIè Régiment Etranger d'Infanterie. Dans la nuit du 24 au 25 janvier 1940 vers 21 heures, l'Adjudant ALEXANDROFF rentrait au cantonnement occupé par sa section, au village de GUENANGE. Aussitôt arrivée dans le local servant de chambrée aux sous-officiers, ALEXANDROFF réclamait à grands cris le légionnaire VOLLMER qui était son brosseur. Ne le voyant pas arriver, il montait l'échelle conduisant à l'emplacement de sa section et, apercevant le caporal CARREL, lui reprochait violemment de ne pas crier après VOLLMER en même temps que lui. CARREL répondait à l'Adjudant que ce n'était pas l'heure de réveiller tout le monde pour chercher un brosseur. \nFurieux, ALEXANDROFF ne dit mot, descendit vers la chambrée des sous-officiers, prit le premier revolver trouvé remonta l'échelle. Il braqua le revolver sur le caporal CARREL couché, lui intima l'ordre d'aller chercher VOLLMER et ajouta : \"Je vais t'assassiner\". Sous cette menace CARREL commença à s'exécuter tandis que deux légionnaires de la 3ème Section, OCHEJ et PRZNIELS se précipitaient sur l'adjudant afin de le désarmer. Dans la lutte très rapide qui s'en suivit un coup de feu partit blessant le légionnaire OCHEJ au mollet gauche. ALEXANDROFF, réalisant la gravité de ce qui venait de se passer et entendant plusieurs reproches et menaces lancés à son égard, traversa le local, se tint à une extrémité face à ses hommes, déboutonna sa vareuse et, offrant sa poitrine en cible, dit : « camarades de la 3e section, je vous donne ma parole d'honneur que ce n'est pas moi qui ait tiré sur OCHEJ, si vous ne me croyez pas, tuez-moi\". Un coup de feu partit aussitôt, mais se perdit dans un mur sans avoir atteint qui que ce soit.\nSur ces entrefaites arrivait le Lieutenant LEVACHER, officier de jour à la 11e compagnie. Il montait l'échelle et se rendant compte de l'incident et de l'hostilité générale manifestée à l'égard d'ALEXANDROFF donnait l'ordre à l'adjudant de descendre. Celui-ci hésita un peu, puis exécutait. Il eut à peine le temps de descendre les deux ou trois premières marches de l'échelle qu'un nouveau coup de feu partit. \nAtteint mortellement, ALEXANDROFF s'écroula et expira au cours du transport au poste de secours de GUENANGE. \nAu moment où ce second coup de feu était tiré, le lieutenant BAUMONT, commandant la 11e compagnie, pénétrait dans la grange. Il a vu l'adjudant affaissé, mais n'aperçu personne dans le couloir. Du premier étage de la grange, où la 3ème Section où se trouvait encore le Lieutenant LEVACHER et plusieurs sous-officiers, rien n'a été vu. Il faut dire aussi qu'il faisait nuit noire et que l'immense grange n'était éclairée que par deux bougies. Ces bougies brûlaient au premier étage et laissaient dans l'obscurité absolue le coin d'où descendait l'échelle. \nL'enquête entreprise immédiatement et qui dure encore aujourd'hui n'a pas permis la découverte de l'assassin. Une information est ouverte par le juge d'instruction près le Tribunal militaire de la 1ère division marocaine. \nIl est certain que le meurtre de l'adjudant ALEXANDROFF est le fruit d'une vengeance, de la part d'un légionnaire qui a profité de l'incident du 24 janvier pour mettre à exécution un projet prémédité depuis un certain temps. L'adjudant ALEXANDROFF était un sous-officier très dur dans son commandement et pouvait avoir des ennemis"}, {"label": "Lieu du décès", "value": "Haute Guénange"}, {"label": "Sépulture définitive", "value": "Yutz - carré militaire tombe A167 plaque 316"}, {"label": "Transcription", "value": "avis de décès dressé par le S/lt Funkl officiel de l'état civil au 11è REI, envoyé au dépôt de Sathenay en 1940 et au consulat de France à Athènes"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Archives du 11è REI (CDRH-LE, Aubagne)"}, {"label": null, "value": "SHD Caen, AC 21 P 4687 (consulté)"}], "warnings": []}}}, {"id": "alexandroff-jacob", "nom": "ALEXANDROFF", "prenom": "Jacob", "surnom": null, "variantes": null, "date_naissance": "(19/11/1903 - Taurick - Russie)", "ville_naissance": "Taurick", "pays_naissance": "Russie", "intro": "En 1931 il est recensé 312 cité de la soie à Vaulx-en-Velin", "blog_url": null, "photo_link": null, "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Alexis et Anne Ivan"}, {"label": "Mariage", "value": "le 01/03/1930 à Vénissieux avec Félicie Viglione"}, {"label": "Enfant(s)", "value": "André Boris (1930)"}, {"label": "Profession", "value": "ouvrier à l'usine TASE"}, {"label": "Description physique", "value": "1,72 m, cheveux bruns, yeux bleus"}], "warnings": []}, "naturalisation": {"label": "Naturalisé", "items": [{"label": null, "value": "JO 20/11/1932 naturalisé ALEXANDROFF (Jacob), manœuvre, né le 19 novembre 1903 à Taurick (Russie), demeurant à Lyon (Rhône), ayant un fils mineur, André-Boris, né le 12 août 1930 à Lyon"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Réserviste - a fait 5 ans de service à la mobilisation"}, {"label": "Registre matricule du recrutement", "value": "cl const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];
const PHOTO_BASE = "https://raw.githubusercontent.com/zestend-collab/11rei-photos/main/";


function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  const photoUrl = PHOTO_BASE + encodeURIComponent(p.id) + '.jpg';
  const onErr = "this.closest('.card').classList.remove('has-photo'); this.closest('.portrait-thumb,.portrait-large').style.display='none';";
  const thumbHtml = '<div class="portrait-thumb"><img src="' + photoUrl + '" alt="" loading="lazy" onerror="' + onErr + '"></div>';
  const largeHtml = '<div class="portrait-large"><img src="' + photoUrl + '" alt="Portrait de ' + esc(fullName) + '" loading="lazy" onerror="' + onErr + '"><div class="cap">Portrait</div></div>';
  return `
  <div class="card has-photo" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      ${thumbHtml}
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        <div class="body-with-photo">
          ${largeHtml}
          <div class="body-main">
            ${introHtml}
            ${sectionsHtml}
            <a class="anchor-link" href="#${p.id}">#${p.id}</a>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
