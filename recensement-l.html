ce)", "ville_naissance": "Rouen", "pays_naissance": "France", "intro": "En 1921, il est recensé à Belbeuf chez ses grands parents. En 1945 il déclare résider à Arras", "blog_url": null, "photo_link": null, "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Raoul (décès en 1917) et Raymonde Emilienne Leroy"}, {"label": "Mariage", "value": "le 29/03/1940 à Rumaucourt avec Lucie Marie Louise Hombert"}, {"label": "Décès", "value": "le 31/07/1985 à Provins"}, {"label": null, "value": "Fratrie: Emilienne"}, {"label": "Profession", "value": "employé, serveur de café"}, {"label": "Description physique", "value": "1,66 m, cheveux blonds, yeux bleus"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "Active - matricule 7506"}, {"label": "Registre matricule du recrutement", "value": "classe 1928, bureau Rouen sud, mle 946"}, {"label": "Service militaire", "value": "engagé volontaire pour 5 ans au titre du 1er dépôt des équipages de la flotte le 06/03/1926. Il est condamné par le conseil de guerre maritime de Brest le 25/04/1928 pour fabrication de fausses permissions et pour avoir favorisé des désertions. Il est libéré conditionnellement le 19/11/1929. Il est déclaré déserteur le 13/12/1929. Il est arrêté par les gendarme d'Elbeuf le 18/01/1930 et il est condamné par le conseil de guerre maritime de Cherbourg à 5 mois de prison pour désertion en temps de paix. Le 12/06/1930, à sa sortie de la prison centrale de Clairvaux, il ne rejoint pas le dépôt et est de nouveau déclaré déserteur. Il est arrêté le 12/06/1931 à Givet. Le 26/02/1932, il est condamné par le conseil de guerre d'Anvers à 8 mois de prison pour port d'arme prohibée et condamné par le conseil de guerre maritime de Cherbourg le 10/06/1932 à 1 an de prison pour désertion à l'étranger en temps de paix. Passé dans la disponibilité le 18/05/1933, CBC refusé"}, {"label": "Info Légion", "value": "engagé volontaire pour 5 ans au titre de la Légion étrangère le 09/04/1935 à Toulouse. Manquant à l'appel du 05/03/1936, en absence illégale à partir du 06/03/1936 il est déclaré déserteur le 12/03/1936, arrêté et placé en détention le même jour. Il est condamné à 2 mois de prison avec sursis par le tribunal militaire permanent d'Oran le 23/06/1936."}, {"label": "Identité déclarée", "value": "engagé sous le nom de Raymond Legray, se disant de nationalité belge"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}], "warnings": []}, "captivite": {"label": "Captivité", "items": [{"label": "Capture", "value": "Liste des prisonniers n°14 du 11/09/1940"}, {"label": "Lieu de captivité", "value": "Il est interné au stalag III A mle 30840"}, {"label": "Rapatriement 1945", "value": "Rapatrié en France le 02/06/1945, puis démobilisé le 10/08/1945 à Marseille"}], "warnings": []}, "justice": {"label": "Justice", "items": [{"label": null, "value": "Presse \"Le Petit Ardennais\" du 11/05/1932, déserteur le 25 juin au 1er dépôt des équipages de la flotte, à Cherbourg, a été arrêté à Givet par la gendarmerie. Il s'était réfugié en Belgique depuis sa désertion où il a été également arrêté pour port d'arme prohibé et de vagabondage sans résidence fixe. Le procès verbal indique qu'il avait aussi une lettre adressée à sa femme, dans laquelle il faisait connaître son intention de mettre fin à ses jours, ainsi qu’une lettre du 05/02/1932 où il annonçait que son corps serait retrouvé sans vie. Le 30/04/1934, il est condamné par défaut par le tribunal correctionnel de La Rochelle à 8 jours de prison pour défaut de carnet anthropométrique d'identité. Le 19/10/1934, il est condamné par le tribunal de Bordeaux à 1 mois de prsion pour vagabondage."}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Archives départem n remplacement du lt David à partir du 03/06/1940"}, {"label": "Pendant la campagne", "value": "Il est blessé le 05/06/1940 (à la jambe par un éclat d’obus alors qu’il se trouve dans son abri). Amputé de la cuisse droite (évacué sur le GACA 18, HOE1 n°5 le 09/05/1940, l’HOE2 le 10/06/1940 puis sur un hôpital de l’arrière à Auch)"}], "warnings": []}, "apres_1940": {"label": "Après juin 1940 : déporté, résistant...", "items": [{"label": null, "value": "Réformé définitif le 10/10/1941"}], "warnings": []}, "citations": {"label": "Citations et décorations", "items": [{"label": null, "value": "JO 26/06/1941 (1ère liste de citations page CG 169) cité à l'ordre de l'armée ordre n° 353/C du 18/10/ 1940. Annulé par l'ordre 435/D (double emploi) \"lieutenant à la 11e compagnie du 11e rég. étranger d'infanterie : officier de légion adoré de ses hommes et d'une magnifique ardeur au feu. Calme et intrépide. A partir du 21 mai 1940, a occupé et organisé sous bois un point d'appui en flèche à courte, distance de l'ennemi, s'y maintenant avec un absolu mépris du danger sous les bombardements les plus intenses. Attaqué très violemment, le 27 mai 1940, a maintenu toutes ses positions et a fait l'admiration de ses chefs. Très grièvement blessé, le 8 juin 1940, alors qu'il galvanisait la ténacité de ses légionnaires soumis à une recrudescence sévère du bombardement. A dû subir une amputation\"."}, {"label": "Légion d'honneur", "value": "JO 29/04/1941 LH ordre 435/D \"lieutenant à la 11e compagnie du 11e rég. étranger d'infanterie : officier de légion adoré de ses hommes et d'une magnifique ardeur au feu. Calme et intrépide. A partir du 21 mai 1940, a occupé et organisé sous bois un point d'appui en flèche à courte, distance de l'ennemi, s'y maintenant avec un absolu mépris du danger sous les bombardements les plus intenses. Attaqué très violemment, le 27 mai 1940, a maintenu toutes ses positions et a fait l'admiration de ses chefs. Très grièvement blessé, le 8 juin 1940, alors qu'il galvanisait la ténacité de ses légionnaires soumis à une recrudescence sévère du bombardement. A dû subir une amputation\". Par arrêté du 29 décembre 1942, est suspendu, pour une durée de six mois, à compter du 2 septembre 1942, les droits et prérogatives attachés à la qualité de membre de la Légion d'honneur, M. le lieutenant Levacher (Jacques-Robert), de la 11e compagnie du 11e rég. étranger d'infanterie, inscrit au tableau spécial de la Légion d'honneur par arrêté du 20 mars 1941 (Journal officiel du 29 avril 1941)"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Citation Journal Officiel"}, {"label": null, "value": "SHD Vincennes GR 8YE 49763 (consulté)"}], "warnings": []}}}, {"id": "leveque", "nom": "LEVEQUE", "prenom": "", "surnom": null, "variantes": null, "date_naissance": null, "ville_naissance": null, "pays_naissance": null, "intro": null, "blog_url": null, "photo_link": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "sergent"}, {"label": "Affectation", "value": "7è compagnie"}, {"label": "Pendant la campagne", "value": "rappel en augmentation le 05/04/1940. Part en permission de détente le 28/04/1940, rejoint l'unité le 11/05/1940"}], "warnings": []}, "citations": {"label": "Citations et décorations", "items": [{"label": null, "value": "JO 26/06/1941 (1ère liste de citations page CG 169) cité à l'ordre de la brigade ordre n°461/C du 15/01/1941"}, {"label": null, "value": "JO 26/06/1941 page CG 169 cité à l'ordre du régiment ordre 461/C du 15/01/1941"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "PLE REI 11/A/2 carnet de mutation 7è Cie"}], "warnings": []}}}, {"id": "lever-hendrik-jacobus", "nom": "LEVER", "prenom": "Hendrik Jacobus", "surnom": "Henri", "variantes": null, "date_naissance": "(22/10/1915 - Anvers - Belgique)", "ville_naissa agne"}], "warnings": []}, "citations": {"label": "Citations et décorations", "items": [{"label": null, "value": "JO 12/12/1942 (4è liste de citations page CGM 222) cité à l’ordre du régiment ordre n°1207 C"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Dossier de naturalisation"}, {"label": "Résistant", "value": "SHD Vincennes GR 16 P 370826 (consulté)"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}, {"label": null, "value": "AN Pierrefitte sur Seine, 19770907/141 (consulté)"}], "warnings": []}}}, {"id": "lewkowicz-szmul-berek", "nom": "LEWKOWICZ", "prenom": "Szmul Berek", "surnom": "Bernard", "variantes": null, "date_naissance": "(22/04/1903 - Olkusz - Pologne)", "ville_naissance": "Olkusz", "pays_naissance": "Pologne", "intro": "En 1936, il est domicilié 213 rue Saint Maur à Paris 10. Le 26/11/1945, il adhère à l'Union des Engagés Volontaires Anciens Combattants Juifs (UEVACJ). En 1961, il habite 31 rue Villin à Paris 20, les immeubles jugés insalubres sont rachetés par la ville de Paris", "blog_url": null, "photo_link": null, "badges": [{"cls": "evade", "label": "Évadé", "stamp": "ÉVADÉ"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "David et Rywka Kolin"}, {"label": "Mariage", "value": "avant 1936 avec Pesla Szerer"}, {"label": "Décès", "value": "le 23/09/1978 à Paris 20"}, {"label": null, "value": "Fratrie: Lea (1900), Pordka (1915)"}, {"label": "Profession", "value": "cordonnier"}], "warnings": []}, "naturalisation": {"label": "Naturalisé", "items": [{"label": null, "value": "JO 06/06/1948 naturalisé LEWKOWICZ (Szmul), Olkusz (Pologne), 22-04-03 — 106x42—75. autorisé à porter légalement le nom de Leucot"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "EVDG"}, {"label": "Liste matricule", "value": "LM 1939, intendance militaire de la Seine bureau c N où il est mis en congés d'armistice le 08/08/1941. Il est rappelé sous les drapeaux au titre du 3è REI, il est blessé le 22/01/1943 à Bit El Arbi avec le 3è REI. Il est réformé définitif le 17/01/1947 et se retire chez Mme Lovinger 26 boulevard Gouraud à Meknès"}], "warnings": []}, "citations": {"label": "Citations et décorations", "items": [{"label": null, "value": "Carte du combattant n°16 606 délivrée à Oran le 20/03/1936"}, {"label": null, "value": "JO 12/12/1942 (4è liste de citations page CGM 222) cité à l’ordre de la division ordre n°1206 C \"chef de section d'engins de tout premier ordre. Le 29/05/1940 au bois d'INOR s'est rendu spontanément sous le feu violent de l'ennemi à un observatoire d'où il a pu parfaire le réglage d'un tir de mortier d'une précision remarquable. A été blessé au cours du tir. Le 18/06 a participé à la tête de sa section au dégagement du PC du régiment, à Saint Germain.\" Croix de guerre avec étoile d'argent + cité à l'ordre du régiment \"sous-officier d'élite, a assuré des tirs précis de mortier sous un violent bombardement le 27 mai. A été blessé alors qu'il observait le résultat de ses tirs\""}, {"label": null, "value": "Médaille militaire du 29/12/1932"}, {"label": "Légion d'honneur", "value": "JO 26/04/1958 Légion d’honneur mutilés de guerre à 100 p. 100: Lovinger (Jacques), ancien adjudant-chef du 3e régiment étranger d’infanterie, actuellement sous-lieutenant honoraire"}], "warnings": []}, "presse": {"label": "Presse", "items": [{"label": null, "value": "JO 04/01/1950 tableau d’avancement au grade de sous-lieutenant: Lovinger (Jacques)"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": "Fiche matricule", "value": "Archives nationales d'Outre Mer"}, {"label": null, "value": "Archives du 11è REI (CDRH-LE, Aubagne)"}, {"label": null, "value": "Gallica.bnf.fr Liste officielle des prisonniers de guerre français"}, {"label": null, "value": "SHD Vincennes GR 8YE 87234 (consulté)"}], "warnings": []}}}, {"id": "l const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  return `
  <div class="card" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${p.photo_link ? ' <a class="photo-link" href="' + esc(p.photo_link) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Portrait disponible">📷</a>' : ''}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        ${introHtml}
        ${sectionsHtml}
        <a class="anchor-link" href="#${p.id}">#${p.id}</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  const qParam = new URLSearchParams(location.search).get('q');
  if(qParam){
    const input = document.getElementById('search');
    input.value = qParam;
    filterList(qParam);
  }

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
