log_url": null, "badges": [{"cls": "mort", "label": "Mort pour la France", "stamp": "MPF"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Mariage", "value": "avec Antonina Kuliberda"}, {"label": "Enfant(s)", "value": "Janina (1925), Helena (1926), Tadeusz (1933)"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "EVDG"}, {"label": "Liste matricule", "value": "LM 1939, intendance militaire de Campan, n°2343"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "2è classe"}, {"label": "Affectation", "value": "2è compagnie"}, {"label": "Pendant la campagne", "value": "il part en permission le 07/05/1940"}], "warnings": []}, "mort_au_combat": {"label": "Mort avec le 11e REI", "items": [{"label": "Mort", "value": "Mort le 13/06/1940"}, {"label": "Lieu du décès", "value": "Spada"}, {"label": "Sépulture", "value": "inhumé initialement à Spada"}, {"label": "Sépulture définitive", "value": "Verdun - Nécropole nationale le Faubourg Pavé - carré 1939-1945, tombe 302"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Archives du 11è REI (CDRH-LE, Aubagne)"}], "warnings": []}}}, {"id": "zavarine-youri-filippovitch", "nom": "ZAVARINE", "prenom": "Youri Filippovitch", "surnom": "Georges", "variantes": null, "date_naissance": "(18/12/1902 - Khersen - Russie)", "ville_naissance": "Khersen", "pays_naissance": "Russie", "intro": "Son père, Filip Vassilievitch Zavarin (1854), était chef du district de navigation de Kherson dans le cadre du département des chemins de fer et des transports du district de Kiev, avec le titre de conseiller collégial. Sa mère, Anastasia Pavlovna Zavarina (1862), était née Tchoudakova. La famille était originaire de Kiev. Yuri a été baptisé sous le prénom de Georges le 14/01/1903 à la cathédrale de l’Assomption de Kherson. Il était le benjamin de la famille. La famille déménageait fréquemment à cause du travail de Filip Vassilievitch. Selon les souvenirs familiaux, Yuri étudiait au gymnase pour garçons de Tcherkassy aux environs de 1916. Pendant la révolution, il a émigré en France, mais son chemin pour y arriver reste incertain. Sa sœur aînée Elena (1892) était mariée à un haut fonctionnaire de Kherson. Elle a émigré avec sa famille via la Crimée en Bulgarie. Il est probable que Yuri, alors mineur, soit parti avec eux. Sous Khrouchtchev, lorsque le retour des émigrés blancs était parfois possible, Yuri a voulu revenir en URSS, mais il n’a pas été autorisé à rentrer, même pour une visite, en raison de son service dans la Légion étrangère. Il s'est installé en Bulgarie d'où il a repris contact avec sa famille, il correspondait avec Alla Astriab (née Diakovskaïa), sa nièce, fille de sa sœur Nina, qui vivait à Kiev. Alla et ses enfants lui ont rendu visite en Bulgarie. Yuri avait une épouse française et, peut-être, une fille. Selon les souvenirs familiaux, il est décédé dans les années 1970", "blog_url": null, "badges": [{"cls": "prison", "label": "Prisonnier de guerre", "stamp": "PG"}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Filipp Vassilievitch et Anastasia Pavlovna Chudakova"}, {"label": null, "value": "Fratrie: Vasily (1879-1934 réprimé politique), Vera (1889), Nina (1890), Elena (1892), Alexandre (1898), Mikhaïl (1899)"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "EVDG"}, {"label": "Liste matricule", "value": "LM 1939, intendance militaire de Belfort. Engagé le 06/09/1939"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "caporal"}, {"label": "Affectation", "value": "6è compagnie"}, {"label": "Section / Spécialité", "value": "3è section chef de groupe"}, {"label": "Pendant la campagne", "value": "Il est blessé le 17/06/1940 à Void"}], "warnings": [ {"label": null, "value": "Mémorial de la Shoah MDLX/4/2"}], "warnings": []}}}, {"id": "zombrowski-ernest", "nom": "ZOMBROWSKI", "prenom": "Ernest", "surnom": null, "variantes": "ZOMBRZYCKI / ZOMBRINSKI", "date_naissance": "(04/04/1898 - Hotzen - Pologne)", "ville_naissance": "Hotzen", "pays_naissance": "Pologne", "intro": "D'octobre 1937 à août 1939 il était domestique chez Pierre Repplinger cultivateur à Kirsch le Sierck", "blog_url": null, "badges": [{"cls": "unknown", "label": "Non renseigné", "stamp": "N.R."}], "sections": {"etat_civil": {"label": "État civil", "items": [{"label": "Parents", "value": "Auguste et Marie ou Marthe Anna Zenda ou Zender (tous les deux décédés)"}, {"label": "Mariage", "value": "célibataire"}, {"label": "Profession", "value": "d'octobre 1937 à août 1939, il est domestique agricole"}, {"label": "Description physique", "value": "1,70 m, cheveux blonds"}, {"label": "Personne à prévenir", "value": "Adresse de la famille inconnue. La personne à prévenir est son employeur M. Repplinger à Kirsch"}], "warnings": []}, "situation_militaire": {"label": "Situation militaire", "items": [{"label": null, "value": "EVDG - matricule au corps 2617"}, {"label": "Liste matricule", "value": "LM 1939, intendance militaire de Bar le Duc, n°297 (A la déclaration de guerre, il se présente pour la mobilisation à la gendarmerie de Sierck)"}], "warnings": []}, "campagne": {"label": "Campagne avec le 11e REI 1939-40", "items": [{"label": "Grade", "value": "caporal"}, {"label": "Affectation", "value": "7è compagnie"}, {"label": "Section / Spécialité", "value": "3è section 8è groupe"}], "warnings": []}, "mort_au_combat": {"label": "Mort avec le 11e REI", "items": [{"label": "Mort", "value": "Mort le 01/02/1940"}, {"label": "Précision décès", "value": "non mort pour la France, suicide par pendaison. PROCES-VERBAL relatant le Suicide par strangulation du caporal ZOMBROWSKI, Ernest, du 11ème Régiment Etranger d'Infanterie. \nGENDARMERIE NATIONALE \nCejourd'hui, trois Février mil neuf cent quarante, à dix-sept heures. \nNous, soussignés, FIMEYER, Jean-Baptiste et CLÉMENT, Lucien, gendarmes à pied, à la résidence de Vigy, département de la Moselle, revêtus de notre uniforme et conformément aux ordres de nos chefs; rapportons, que le 31 Janvier 1940, à 18 heures 20, étant au bureau de notre brigade, avons été informés téléphoniquement par le Commandant de la brigade de Gendarmerie de Maizières-les-Metz que le cadavre d'un homme venait d'être découvert pendu à un saule d'un buisson se trouvant sur la rive gauche de la Moselle, sur le territoire de la commune d'Argancy, à quelques cents mètres en aval de la Centrale électrique de la ville de Metz. En raison de l'heure tardive et de l'obscurité, nous nous sommes rendus dans la commune d'Argancy le 1er Février 1940, à huit heures. A notre arrivée dans cette commune, l'autorité municipale n'avait pas connaissance de l'existence d'un pendu sur le territoire de sa commune et aucune personne n'a pu nous indiquer l'endroit où se trouvait le cadavre signalé. Nous nous sommes donc livrés à des recherches, lesquelles nous ont permis de découvrir, à 12 heures 50, le corps du décédé. Il s'agit d'un homme paraissant âgé d'une quarantaine d'année, en tenue militaire, portant les galons de caporal. Le corps était pendu à un saule d'un buisson situé au lieu dit \"Haute Fontaine\", sur la rive gauche de la Moselle, à 1500 mètres environ au Nord et en aval de la Centrale électrique de la ville de Metz, sur le territoire de la commune d'Argancy. Il faisait face au Sud et se trouvait dans la position assise sur ses jambes dont les pieds ressortaient à gauche et en arrière de son corps. Le bras droit pendait le long du corps, le revers de la main légèrement appuyé sur le sol. Le bras gauche pendait également le long du corps, la main reposant sur la cuisse du même coté. Le cadavre était revêtu de la tenue militaire kaki. Sa capote était boutonnée, le col relevé et son ceinturon bouclé. Il était coiffé d'un bonnet de police dont les rebords couvraient les oreilles. Le corps était rigide et couvert de neige. Il était pendu au moyen de son cache-nez en laine de couleur brique claire. Celui-ci faisait deux fois le tour de son cou au-dessus du larynx et les deux extrémités remontaient de chaque côté de l'oreille gauche jusqu'à la fourche d'un saule élevée à un mètre vingt du sol à laquelle les dites extrémités du cache-nez étaient nouées. Autour du buisson, des traces de pas étaient visibles dans la neige. Nous supposons que ce sont les traces de la personne qui a découvert le pendu, personne qui n'est pas connue de nous. Aucune autre trace ni indice pouvant laisser croire qu'il y ait eu crime n'ont été relevés sur les lieux. Le caporal décédé correspond au signalement suivant : taille 1 mètre 70 environ, cheveux et sourcils blonds, nez rectiligne, moustaches blondes, menton rond, visage maigre, sans signe particulier apparent, vêtu d'une capote kaki portant sur la doublure de la poche intérieure l'inscription faite au crayon \"BUPY\", d'un chandail en laine à carreaux gris, bleus et blancs, d'une chemise et d'une cravate kaki, d'un caleçon, d'une ceinture de flanelle bleue, d'une paire de culotte kaki, d'une paire de bandes molletières kaki, coiffé d'un bonnet de police et chaussé de brodequins. Ces effets ne portent aucun insigne de Corps. Le mort était dépourvu de plaque d'identité. Dans les poches de ses vêtements, nous avons découvert deux paires de gants kaki, un billet de cinq francs, une boîte à tabac contenant un cahier de feuilles à cigarettes, un porte-monnaie en cuir marron fermant au moyen d'un bouton à pression, avec fermeture éclair à l'intérieur, et contenant la somme de deux francs dix centimes, plus une lame Gillette pour rasoir mécanique, d'un carnet de notes au nom de VOZNIAC, légionnaire de 1ère classe et portant à la première page les inscriptions suivantes faites au crayon : \"11ème R.E.- Chef de Section: Sous-lieutenant BERTOLET\", d'un exemplaire de consigne de défense du groupe. Cette consigne porte le numéro 213 et comporte entre autre les indications suivantes: \"Consigne du groupe N°3, chef : Sergent LEGRAND; suppléant : Caporal LEGROS\". Elle ne comporte pas l'indication du Corps. A la demande de Monsieur le Maire de la commune d'Argancy, le Médecin-Lieutenant GIR Paul, du 1er Groupe du 64ème R.A.A., secteur postal 47, s'est transporté sur les lieux et a examiné le caporal décédé. Ce praticien n'a relevé sur le cadavre aucune trace de blessure ni de violence en dehors du sillon de strangulation. Il a conclu que la mort semblait due au suicide et remontait à trois jours au moins. Ce Médecin-Lieutenant a prévenu le service de Santé de la 1ère Division marocaine. Il nous a remis le rapport de ses constatations que nous joignons à la première expédition de notre procès-verbal. \nAucune personne sur les lieux ne connaissant le décédé et celui-ci paraissant appartenir au 11ème R.E., nous avons essayé de communiquer téléphoniquement avec l'Etat-major de ce régiment, mais nous n'avons pu obtenir la communication, la ligne téléphonique avec Argancy ne fonctionnant pas. Le corps du caporal décédé a été transporté à la morgue de la commune d'Argancy.\nLe 2 février 1940, nous avons communiqué téléphoniquement les renseignements obtenus au cour de notre enquête à l'État-major du 11ème Régiment Étranger d'infanterie afin de connaître l'identité du décédé.\n Le 3 février 1940 à 9 heures le sergent KRASSEF Panalot, 40 ans, du 11ème Régiment étranger d'Infanterie, 7ème Compagnie, 3ème Section, secteur postal 193, envoyé à Argancy, afin de reconnaître le décédé, a été mis en présence du cadavre. Il a déclaré en langue française : Je reconnais formellement le cadavre que vous me présentez comme étant celui du caporal ZOMBROWSKI, Ernest, du 8ème Groupe de ma compagnie. Il est né le 4 avril 1898 en Pologne (j'ignore dans quelle localité). Sa nationalité est polonaise. Il est célibataire. Je ne puis fournir plus de renseignements sur son identité. Ce caporal manquait à l'appel du soir du 28 janvier 1940. Depuis il n'avait pas été revu. Cet homme était toujours triste et parlait très peu. La veille de son départ, il avait dit à son Lieutenant qu'il voudrait bien se bourrer. Par ce mot, il voulait dire s'enivrer. Le Lieutenant DELMAS lui a déconseillé de prendre une cuite, ajoutant que ce n'était pas joli. Je suppose donc que le caporal ZOMBROWSKI a bu plus que de raison et a attenté à ses jours sous I' effet de la boisson. \nLecture faite, a persisté et a signé. \nLe même jour, le Sous-lieutenant FUNKL Frédéric, faisant fonction d'Officier d'état civil au 11ème Régiment Etranger d'infanterie, s'est présenté à notre bureau et nous a donné les renseignements suivants sur l'identité du décédé: \nEtat civil du défunt : ZOMBROSKI, Ernest, né le 4 avril 1898, fils des feus Auguste et ZENDER, Anne Marie, engagé volontaire pour la durée de la guerre le 18 Septembre 1939 à Bar-le-Duc, affecté au 11ème Régiment Etranger d'Infanterie, 2ème Bataillon, 7ème Compagnie. \nL'argent et les objets personnels retirés des poches des vêtements du caporal ZOMBROWSKI ont été remis au Sous-lieutenant FUNKL précité contre reçu que nous joignons à la première expédition du présent. L'acte de décès du caporal ZOMBROSKI a été dressé à la Mairie d'Argancy sous le n°6. Le permis d'inhumer ayant été délivré le 3 Février"}, {"label": "Lieu du décès", "value": "Argancy"}, {"label": "Sépulture définitive", "value": "Sarrebourg - carré militaire de la Nécropole nationale Buhl, le Marxberg - tombe 325"}], "warnings": []}, "sources": {"label": "Sources", "items": [{"label": null, "value": "Site mémoire des hommes (Militaires décédés au cours de la Seconde Guerre mondiale)"}, {"label": null, "value": "SHD Caen, AC 21 P 172521 (consulté)"}], "warnings": []}}}, {"id": "zonder-szmul", "nom": "ZONDER", "prenom": "Szmul", "surnom": "Simon", "variantes": null, "date_naissance": "(18/05/1918 - Mogelica - Pologne)", "ville_naissan const SECTION_ORDER = ["etat_civil", "naturalisation", "situation_militaire", "campagne", "mort_au_combat", "captivite", "apres_1940", "mort_apres_1940", "citations", "justice", "presse", "sources"];

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMeta(p){
  const parts = [];
  if(p.date_naissance) parts.push(p.date_naissance);
  else {
    const bits = [p.ville_naissance, p.pays_naissance].filter(Boolean);
    if(bits.length) parts.push(bits.join(' — '));
  }
  return parts.join(' · ');
}

function renderSection(key, sec){
  if(!sec) return '';
  let html = '<div class="section"><h3>' + esc(sec.label) + '</h3>';
  (sec.warnings || []).forEach(w => {
    html += '<div class="warning"><span class="flabel">⚠ ' + esc(w.label) + '</span>' + esc(w.value) + '</div>';
  });
  (sec.items || []).forEach(it => {
    const labelHtml = it.label ? '<span class="flabel">' + esc(it.label) + '</span>' : '';
    html += '<div class="field">' + labelHtml + esc(it.value) + '</div>';
  });
  html += '</div>';
  return html;
}

function renderCard(p){
  const badges = p.badges.map(b => '<span class="stamp stamp-' + b.cls + '" title="' + esc(b.label) + '">' + esc(b.stamp) + '</span>').join('');
  const introHtml = p.intro ? '<div class="intro">' + esc(p.intro) + '</div>' : '';
  const sectionsHtml = SECTION_ORDER.map(k => renderSection(k, p.sections[k])).join('');
  const fullName = p.nom + (p.prenom ? ' ' + p.prenom : '');
  const surnomHtml = p.surnom ? ' <span class="surnom-suffix">dit ' + esc(p.surnom) + '</span>' : '';
  return `
  <div class="card" id="${p.id}" data-id="${p.id}">
    <div class="card-head" onclick="toggleCard('${p.id}')">
      <div class="toggle">+</div>
      <div class="card-summary">
        <div class="card-name">${esc(fullName)}${surnomHtml}${p.blog_url ? ' <a class="blog-link" href="' + esc(p.blog_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">En savoir plus →</a>' : ''}</div>
        <div class="card-meta">${esc(renderMeta(p))}</div>
      </div>
      <div class="card-badges">${badges}</div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        ${introHtml}
        ${sectionsHtml}
        <a class="anchor-link" href="#${p.id}">#${p.id}</a>
      </div>
    </div>
  </div>`;
}

function toggleCard(id, forceOpen){
  const card = document.getElementById(id);
  if(!card) return;
  if(forceOpen === true){ card.classList.add('open'); return; }
  if(forceOpen === false){ card.classList.remove('open'); return; }
  card.classList.toggle('open');
}

function normalize(s){
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

function buildSearchIndex(p){
  return normalize([p.nom, p.variantes].filter(Boolean).join(' '));
}

function filterList(query){
  const q = normalize(query.trim());
  const list = document.getElementById('list');
  const cards = list.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const idx = card.dataset.searchIndex || '';
    const match = !q || idx.includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visible++;
  });
  document.getElementById('count').textContent = visible + ' fiche' + (visible > 1 ? 's' : '') + (q ? ' trouvée' + (visible > 1 ? 's' : '') : '');
  document.getElementById('no-results').style.display = (visible === 0) ? 'block' : 'none';
}

function init(){
  document.getElementById('count').textContent = PEOPLE.length + ' fiches';
  document.getElementById('list').innerHTML = PEOPLE.map(renderCard).join('') +
    '<div class="no-results" id="no-results">Aucune fiche ne correspond à cette recherche.</div>';

  PEOPLE.forEach(p => {
    const card = document.getElementById(p.id);
    if(card) card.dataset.searchIndex = buildSearchIndex(p);
  });

  document.getElementById('search').addEventListener('input', e => filterList(e.target.value));
  document.getElementById('reset-btn').addEventListener('click', () => {
    const input = document.getElementById('search');
    input.value = '';
    filterList('');
    input.focus();
  });

  document.getElementById('top-btn').addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));

  if(location.hash){
    const id = location.hash.slice(1);
    const card = document.getElementById(id);
    if(card){
      toggleCard(id, true);
      setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'start'}), 80);
    }
  }
}
init();
</script>
